<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://photon.komoot.io https://geocode.arcgis.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Pluto Human Design Chart</title>
  <link rel="preload" as="image" href="assets/pluto-vellum-bg-v4.png">
  <link rel="preload" as="image" href="assets/pluto-form-bg-v3.png">
  <link rel="preload" as="image" href="assets/pluto-form-mobile-v4.png" media="(max-width: 560px)">
  <link rel="stylesheet" href="style.css?v=20260715-2">
</head>
<body>
  <header class="topbar">
    <div class="brand">Pluto Human Design</div>
    <div class="topbar-actions">
      <nav aria-label="Primary">
        <a href="#chartForm" id="navCreate" data-i18n="navCreate">创建人类图</a>
        <a href="#capture" id="navChart" data-i18n="navChart">我的人类图</a>
      </nav>
      <div class="language-switch" role="group" aria-label="Language / 语言">
        <button type="button" data-language="zh" aria-pressed="true">中文</button>
        <button type="button" data-language="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>
  <main class="shell form-view">
    <section class="form-panel">
      <p class="eyebrow" data-i18n="formEyebrow">人类图</p>
      <h1 data-i18n="formTitle">生成你的人类图</h1>
      <form id="chartForm">
        <label><span data-i18n="name">姓名</span><input id="name" name="name" maxlength="80" autocomplete="off" required></label>
        <div class="grid3">
          <label><span data-i18n="year">年</span><select id="year" required></select></label>
          <label><span data-i18n="month">月</span><select id="month" required></select></label>
          <label><span data-i18n="day">日</span><select id="day" required></select></label>
        </div>
        <div class="grid3">
          <label><span data-i18n="hour">时</span><select id="hour" required></select></label>
          <label><span data-i18n="minute">分</span><select id="minute" required></select></label>
          <label><span data-i18n="ampm">上午/下午</span>
            <select id="ampm" required>
              <option value="" selected disabled>--</option>
              <option value="pm" data-i18n="pm">下午</option>
              <option value="am" data-i18n="am">上午</option>
            </select>
          </label>
        </div>
        <label><span data-i18n="birthLocation">出生地点</span>
          <div class="location-combobox">
            <input id="location" name="location" type="search" role="combobox" placeholder="城市、区县或地区" autocomplete="off" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="locationResults" aria-expanded="false" aria-describedby="status" required>
            <ul id="locationResults" class="location-results" role="listbox" aria-label="出生地点建议" hidden></ul>
          </div>
        </label>
        <label id="clockOccurrenceField" hidden><span data-i18n="clockOccurrence">重复时刻</span>
          <select id="clockOccurrence">
            <option value="earlier" data-i18n="firstOccurrence">第一次出现</option>
            <option value="later" data-i18n="secondOccurrence">第二次出现</option>
          </select>
        </label>
        <p class="place-attribution" data-i18n="attribution">可直接输入完整地点，无需选择候选。</p>
        <button type="submit" data-i18n="generate">生成人类图</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="chart-panel" id="capture" hidden>
      <div class="chart-meta">
        <div>
          <p class="eyebrow" data-i18n="yourChart">你的人类图</p>
          <h2 id="personName">-</h2>
          <p id="birthLine" data-i18n="emptyChart">填写出生资料后生成。</p>
        </div>
        <div class="chart-actions">
          <button id="editChart" type="button" data-i18n="editChart">重新填写</button>
          <button id="download" type="button" disabled data-i18n="download">下载 图片</button>
        </div>
      </div>
      <div class="chart-frame">
        <div class="chart-layout">
          <div class="side-column">
            <p data-i18n="design">设计</p>
            <ol id="designList" class="planet-list"></ol>
          </div>
          <div class="chart-graph">
            <div id="bodygraph" role="img" aria-label="Human Design bodygraph"></div>
            <p class="watermark" data-i18n="watermark">Swiss Ephemeris · 精确 88° 太阳弧</p>
          </div>
          <div class="side-column right">
            <p data-i18n="personality">人格</p>
            <ol id="personalityList" class="planet-list right"></ol>
          </div>
        </div>
      </div>
      <div id="properties" class="properties"></div>
    </section>
  </main>
  <script src="vendor/tz-lookup/tz.js?v=20260715-2"></script>
  <script src="vendor/html2canvas/html2canvas.min.js?v=20260715-2"></script>
  <script type="module" src="app.js?v=20260715-2"></script>
</body>
</html>
