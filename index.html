<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://photon.komoot.io https://geocode.arcgis.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Pluto Life Manual</title>
  <link rel="preload" as="image" href="assets/pluto-vellum-bg-v4.png">
  <link rel="preload" as="image" href="assets/pluto-form-bg-v3.png">
  <link rel="preload" as="image" href="assets/pluto-form-mobile-v4.png" media="(max-width: 560px)">
  <link rel="stylesheet" href="style.css?v=20260717-13">
</head>
<body>
  <header class="topbar">
    <div class="brand" data-i18n="brand">Pluto 人生使用说明书</div>
    <div class="topbar-actions">
      <div class="language-switch" role="group" aria-label="Language / 语言">
        <button type="button" data-language="zh" aria-pressed="true">中文</button>
        <button type="button" data-language="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>
  <main class="shell form-view">
    <section class="form-panel">
      <p class="eyebrow" data-i18n="formEyebrow">人生使用说明书</p>
      <h1 data-i18n="formTitle">认识你自己</h1>
      <form id="chartForm">
        <label><span data-i18n="name">姓名</span><input id="name" name="name" maxlength="80" autocomplete="off" required></label>
        <div class="grid3">
          <label><span data-i18n="year">年</span><select id="year" required></select></label>
          <label><span data-i18n="month">月</span><select id="month" required></select></label>
          <label><span data-i18n="day">日</span><select id="day" required></select></label>
        </div>
        <div class="grid3">
          <label><span data-i18n="hour">时</span><select id="hour" required></select></label>
          <label><span data-i18n="minute">分</span><select id="minute" required></select></label>
          <div class="ampm-field">
            <span id="ampmLabel" class="sr-only" data-i18n="ampm">上午/下午</span>
            <div id="ampmSwitch" class="ampm-switch" role="group" aria-labelledby="ampmLabel">
              <button type="button" data-ampm="am" data-i18n="am" aria-pressed="true">上午</button>
              <button type="button" data-ampm="pm" data-i18n="pm" aria-pressed="false">下午</button>
            </div>
            <input id="ampm" name="ampm" type="hidden" value="am">
          </div>
        </div>
        <label><span data-i18n="birthLocation">出生地点</span>
          <div class="location-combobox">
            <input id="location" name="location" type="search" role="combobox" placeholder="城市、区县或地区" autocomplete="off" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="locationResults" aria-expanded="false" aria-describedby="status" required>
            <ul id="locationResults" class="location-results" role="listbox" aria-label="出生地点建议" hidden></ul>
          </div>
        </label>
        <label id="clockOccurrenceField" hidden><span data-i18n="clockOccurrence">重复时刻</span>
          <select id="clockOccurrence">
            <option value="earlier" data-i18n="firstOccurrence">第一次出现</option>
            <option value="later" data-i18n="secondOccurrence">第二次出现</option>
          </select>
        </label>
        <p class="place-attribution" data-i18n="attribution">可直接输入完整地点，无需选择候选。</p>
        <button type="submit" data-i18n="generate">免费获取人生使用说明书</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="result-panel" id="chartResult" hidden>
      <div class="result-toolbar">
        <label class="privacy-toggle">
          <input id="privacyMode" type="checkbox">
          <span class="toggle-track" aria-hidden="true"><span></span></span>
          <span data-i18n="privacyMode">隐私模式</span>
        </label>
        <div class="chart-actions">
          <button id="editChart" type="button"><span class="button-icon" aria-hidden="true">↺</span><span data-i18n="editChart">重新填写</span></button>
          <button id="download" type="button" disabled><span class="button-icon" aria-hidden="true">↓</span><span data-i18n="download">保存图片</span></button>
          <button id="share" type="button" disabled><span class="button-icon" aria-hidden="true">↗</span><span data-i18n="share">分享</span></button>
        </div>
      </div>
      <div class="preview-stage">
        <button id="detailReading" class="detail-fab" type="button"><span class="button-icon" aria-hidden="true">☷</span><span data-i18n="detailReading">详细解读</span></button>
        <img id="chartPreview" class="chart-preview" alt="人生使用说明书" data-i18n-alt="previewAlt">
      </div>
    </section>

    <dialog id="detailDialog" class="detail-dialog">
      <div class="detail-dialog-header">
        <div>
          <p class="eyebrow" data-i18n="brand">Pluto 人生使用说明书</p>
          <h2 data-i18n="detailReading">详细解读</h2>
        </div>
        <button id="closeDetail" class="dialog-close" type="button"><span aria-hidden="true">×</span><span class="sr-only" data-i18n="close">关闭</span></button>
      </div>
      <div id="detailContent" class="detail-content"></div>
    </dialog>

    <section class="chart-panel export-mobile capture-source" id="capture" aria-hidden="true">
      <div class="chart-meta">
        <div>
          <p class="eyebrow" data-i18n="yourChart">你的人生使用说明书</p>
          <h2 id="personName">-</h2>
          <p id="birthLine" data-i18n="emptyChart">填写出生资料后生成。</p>
        </div>
      </div>
      <div class="chart-frame">
        <div class="chart-layout">
          <div class="side-column">
            <p data-i18n="design">设计</p>
            <ol id="designList" class="planet-list"></ol>
          </div>
          <div class="chart-graph">
            <div id="bodygraph" role="img" aria-label="Life Manual bodygraph"></div>
            <p class="watermark" data-i18n="watermark">Swiss Ephemeris · 出生前回溯 88° 太阳弧 · True Node</p>
          </div>
          <div class="side-column right">
            <p data-i18n="personality">人格</p>
            <ol id="personalityList" class="planet-list right"></ol>
          </div>
        </div>
        <footer class="poster-footer">
          <div class="qr-block">
            <img id="chartQr" src="assets/chart-qr.png" width="360" height="360" alt="" aria-hidden="true">
            <p data-i18n="qrLabel">扫码获取</p>
          </div>
        </footer>
      </div>
      <section class="interpretation" aria-labelledby="interpretationTitle">
        <p id="interpretationTitle" class="interpretation-title" data-i18n="interpretationTitle">解读</p>
        <p id="interpretationText"></p>
      </section>
      <section class="celebrity-matches" aria-labelledby="celebrityTitle">
        <div class="celebrity-heading">
          <p id="celebrityTitle" class="celebrity-title" data-i18n="celebrityTitle">拥有相似基础配置的人物</p>
          <p data-i18n="celebrityBasis">基于类型、权威、人生角色与定义匹配</p>
        </div>
        <div id="celebrityMatches" class="celebrity-grid"></div>
        <p class="celebrity-note" data-i18n="celebrityNote">名人结构参考公开出生资料；相似仅指图谱结构，不代表性格、经历或命运相同。</p>
      </section>
      <div id="properties" class="properties"></div>
    </section>
  </main>
  <script src="vendor/tz-lookup/tz.js?v=20260715-11"></script>
  <script src="vendor/html2canvas/html2canvas.min.js?v=20260715-11"></script>
  <script type="module" src="app.js?v=20260717-13"></script>
</body>
</html>
