<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Human Design Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">My Human Design</div>
    <nav aria-label="Primary">
      <a href="#chartForm">Create Chart</a>
      <a href="#capture">My Chart</a>
    </nav>
  </header>
  <main class="shell">
    <section class="form-panel">
      <p class="eyebrow">Human Design Chart</p>
      <h1>Get Your Human Design Chart</h1>
      <form id="chartForm">
        <label>Name <input id="name" name="name" value="Test" required></label>
        <div class="grid3">
          <label>Year <select id="year" required></select></label>
          <label>Month <select id="month" required></select></label>
          <label>Day <select id="day" required></select></label>
        </div>
        <div class="grid3">
          <label>Hour <select id="hour" required></select></label>
          <label>Minute <select id="minute" required></select></label>
          <label>AM/PM
            <select id="ampm">
              <option value="pm">PM</option>
              <option value="am">AM</option>
            </select>
          </label>
        </div>
        <label>Birth location
          <select id="location" required>
            <optgroup label="China">
              <option value="Shanghai, China" data-timezone="Asia/Shanghai" selected>Shanghai, China</option>
              <option value="Beijing, China" data-timezone="Asia/Shanghai">Beijing, China</option>
              <option value="Guangzhou, China" data-timezone="Asia/Shanghai">Guangzhou, China</option>
              <option value="Shenzhen, China" data-timezone="Asia/Shanghai">Shenzhen, China</option>
              <option value="Chengdu, China" data-timezone="Asia/Shanghai">Chengdu, China</option>
              <option value="Hangzhou, China" data-timezone="Asia/Shanghai">Hangzhou, China</option>
              <option value="Wuhan, China" data-timezone="Asia/Shanghai">Wuhan, China</option>
              <option value="Xi'an, China" data-timezone="Asia/Shanghai">Xi'an, China</option>
              <option value="Hong Kong" data-timezone="Asia/Hong_Kong">Hong Kong</option>
              <option value="Taipei, Taiwan" data-timezone="Asia/Taipei">Taipei, Taiwan</option>
            </optgroup>
            <optgroup label="Asia Pacific">
              <option value="Singapore" data-timezone="Asia/Singapore">Singapore</option>
              <option value="Tokyo, Japan" data-timezone="Asia/Tokyo">Tokyo, Japan</option>
              <option value="Seoul, South Korea" data-timezone="Asia/Seoul">Seoul, South Korea</option>
              <option value="Bangkok, Thailand" data-timezone="Asia/Bangkok">Bangkok, Thailand</option>
              <option value="Sydney, Australia" data-timezone="Australia/Sydney">Sydney, Australia</option>
            </optgroup>
            <optgroup label="Europe & Middle East">
              <option value="London, United Kingdom" data-timezone="Europe/London">London, United Kingdom</option>
              <option value="Paris, France" data-timezone="Europe/Paris">Paris, France</option>
              <option value="Berlin, Germany" data-timezone="Europe/Berlin">Berlin, Germany</option>
              <option value="Dubai, United Arab Emirates" data-timezone="Asia/Dubai">Dubai, United Arab Emirates</option>
            </optgroup>
            <optgroup label="Americas">
              <option value="New York, United States" data-timezone="America/New_York">New York, United States</option>
              <option value="Los Angeles, United States" data-timezone="America/Los_Angeles">Los Angeles, United States</option>
              <option value="Chicago, United States" data-timezone="America/Chicago">Chicago, United States</option>
              <option value="Toronto, Canada" data-timezone="America/Toronto">Toronto, Canada</option>
              <option value="Vancouver, Canada" data-timezone="America/Vancouver">Vancouver, Canada</option>
            </optgroup>
          </select>
        </label>
        <input id="timezone" type="hidden" value="Asia/Shanghai">
        <button type="submit">Generate Chart</button>
        <p id="status"></p>
      </form>
    </section>

    <section class="chart-panel" id="capture">
      <div class="chart-meta">
        <div>
          <p class="eyebrow">Your Chart</p>
          <h2 id="personName">-</h2>
          <p id="birthLine">Enter details to generate.</p>
        </div>
        <button id="download" type="button">Download PNG</button>
      </div>
      <div class="chart-frame">
        <div class="chart-layout">
          <div class="side-column">
            <p>Design</p>
            <ol id="designList" class="planet-list"></ol>
          </div>
          <div class="chart-graph">
            <div id="bodygraph" role="img" aria-label="Human Design bodygraph"></div>
            <p class="watermark">Swiss Ephemeris &middot; exact 88&deg; solar arc</p>
          </div>
          <div class="side-column right">
            <p>Personality</p>
            <ol id="personalityList" class="planet-list right"></ol>
          </div>
        </div>
      </div>
      <div id="properties" class="properties"></div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
