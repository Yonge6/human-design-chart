<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://photon.komoot.io; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Pluto Human Design Chart</title>
  <link rel="stylesheet" href="style.css?v=20260711-3">
</head>
<body>
  <header class="topbar">
    <div class="brand">Pluto Human Design</div>
    <nav aria-label="Primary">
      <a href="#chartForm">Create Chart</a>
      <a href="#capture">My Chart</a>
      <a href="https://github.com/Yonge6/human-design-chart" rel="noopener">Source</a>
    </nav>
  </header>
  <main class="shell">
    <section class="form-panel">
      <p class="eyebrow">Human Design Chart</p>
      <h1>Get Your Human Design Chart</h1>
      <form id="chartForm">
        <label>Name <input id="name" name="name" value="Test" maxlength="80" required></label>
        <div class="grid3">
          <label>Year <select id="year" required></select></label>
          <label>Month <select id="month" required></select></label>
          <label>Day <select id="day" required></select></label>
        </div>
        <div class="grid3">
          <label>Hour <select id="hour" required></select></label>
          <label>Minute <select id="minute" required></select></label>
          <label>AM/PM
            <select id="ampm">
              <option value="pm">PM</option>
              <option value="am">AM</option>
            </select>
          </label>
        </div>
        <label>Birth location
          <div class="location-combobox">
            <input id="location" name="location" type="search" role="combobox" value="Shanghai, China" placeholder="City, district or region" autocomplete="off" aria-autocomplete="list" aria-haspopup="listbox" aria-controls="locationResults" aria-expanded="false" aria-describedby="status" required>
            <ul id="locationResults" class="location-results" role="listbox" aria-label="Birth location suggestions" hidden></ul>
          </div>
        </label>
        <label id="clockOccurrenceField" hidden>Clock occurrence
          <select id="clockOccurrence">
            <option value="earlier">First occurrence</option>
            <option value="later">Second occurrence</option>
          </select>
        </label>
        <p class="place-attribution">Search queries are sent to Photon. Data &copy; <a href="https://www.openstreetmap.org/copyright" rel="noopener">OpenStreetMap contributors</a>, ODbL.</p>
        <button type="submit">Generate Chart</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="chart-panel" id="capture">
      <div class="chart-meta">
        <div>
          <p class="eyebrow">Your Chart</p>
          <h2 id="personName">-</h2>
          <p id="birthLine">Enter details to generate.</p>
        </div>
        <button id="download" type="button" disabled>Download PNG</button>
      </div>
      <div class="chart-frame">
        <div class="chart-layout">
          <div class="side-column">
            <p>Design</p>
            <ol id="designList" class="planet-list"></ol>
          </div>
          <div class="chart-graph">
            <div id="bodygraph" role="img" aria-label="Human Design bodygraph"></div>
            <p class="watermark">Swiss Ephemeris &middot; exact 88&deg; solar arc</p>
          </div>
          <div class="side-column right">
            <p>Personality</p>
            <ol id="personalityList" class="planet-list right"></ol>
          </div>
        </div>
      </div>
      <div id="properties" class="properties"></div>
    </section>
  </main>
  <script src="vendor/tz-lookup/tz.js?v=20260711-3"></script>
  <script src="vendor/html2canvas/html2canvas.min.js?v=20260711-3"></script>
  <script type="module" src="app.js?v=20260711-3"></script>
</body>
</html>
